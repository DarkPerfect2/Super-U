services:
  - type: web
    name: super-u-api
    env: node
    plan: starter
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.js
    autoDeploy: true
    healthCheckPath: /api/config/policy
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_CLIENT
        value: "false"
      - key: LOG_LEVEL
        value: warn
      - key: REFRESH_TOKEN_EXPIRY
        value: 7d
      - key: FRONTEND_URL
        value: https://shop.example.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://shop.example.com,https://admin.example.com
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: giantcasino
